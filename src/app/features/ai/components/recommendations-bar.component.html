@if (recService.recommendations().length > 0) {
  <div
    class="bg-gradient-to-l from-amber-50 to-orange-50 border border-amber-200 rounded-xl p-4"
  >
    <div class="flex items-center gap-2 mb-3">
      <span class="text-lg">💡</span>
      <h4 class="text-sm font-bold text-amber-800">اقتراحات ذكية</h4>
      <span class="text-xs text-amber-500"> بناءً على محتويات السلة </span>
    </div>

    <div class="flex gap-2 overflow-x-auto pb-1">
      @for (rec of recService.recommendations(); track rec.product.id) {
        <button
          (click)="addToCart.emit(rec.product)"
          class="flex-shrink-0 bg-white rounded-lg border border-amber-200 p-3 min-w-[140px] text-right hover:shadow-md hover:border-amber-400 transition-all duration-200 group"
        >
          <div class="flex items-start justify-between mb-2">
            <span class="text-2xl">
              {{ getCategoryIcon(rec.product.category) }}
            </span>
            <span
              class="bg-amber-100 text-amber-600 text-[10px] px-1.5 py-0.5 rounded-full font-medium opacity-0 group-hover:opacity-100 transition-opacity"
            >
              + أضف
            </span>
          </div>
          <p class="text-xs font-bold text-slate-800 truncate mb-1">
            {{ rec.product.name }}
          </p>
          <p class="text-[10px] text-amber-600 mb-1.5">
            {{ rec.reason }}
          </p>
          <p class="text-sm font-bold text-blue-600">
            {{ rec.product.price }} ر.س
          </p>
        </button>
      }
    </div>
  </div>
}
