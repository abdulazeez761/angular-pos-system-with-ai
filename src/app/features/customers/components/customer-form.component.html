<div
  class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"
  (click)="close.emit()"
>
  <div
    class="bg-white rounded-2xl shadow-xl w-full max-w-lg"
    (click)="$event.stopPropagation()"
  >
    <!-- العنوان -->
    <div class="flex items-center justify-between p-5 border-b">
      <h3 class="text-lg font-bold text-slate-800">
        {{ editCustomer() ? "تعديل بيانات العميل" : "إضافة عميل جديد" }}
      </h3>
      <button
        (click)="close.emit()"
        class="text-slate-400 hover:text-slate-600 text-2xl leading-none transition-colors"
      >
        ×
      </button>
    </div>

    <!-- الحقول -->
    <div class="p-5 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          الاسم الكامل
        </label>
        <input
          type="text"
          [(ngModel)]="form.name"
          class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="مثال: أحمد محمد"
        />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            رقم الجوال
          </label>
          <input
            type="tel"
            [(ngModel)]="form.phone"
            dir="ltr"
            class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-left"
            placeholder="05XXXXXXXX"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            البريد الإلكتروني
          </label>
          <input
            type="email"
            [(ngModel)]="form.email"
            dir="ltr"
            class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-left"
            placeholder="example@email.com"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          العنوان
        </label>
        <input
          type="text"
          [(ngModel)]="form.address"
          class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="المدينة - الحي"
        />
      </div>
    </div>

    <!-- الأزرار -->
    <div class="flex gap-2 p-5 border-t">
      <button
        (click)="close.emit()"
        class="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50 transition-colors"
      >
        إلغاء
      </button>
      <button
        (click)="onSave()"
        [disabled]="!isValid()"
        class="flex-1 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-bold hover:bg-blue-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
      >
        {{ editCustomer() ? "حفظ التعديلات" : "إضافة العميل" }}
      </button>
    </div>
  </div>
</div>
