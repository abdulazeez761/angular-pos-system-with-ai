<div
  class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"
  (click)="close.emit()"
>
  <div
    class="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto"
    (click)="$event.stopPropagation()"
  >
    <!-- العنوان -->
    <div class="flex items-center justify-between p-5 border-b">
      <h3 class="text-lg font-bold text-slate-800">
        {{ editProduct() ? "تعديل المنتج" : "إضافة منتج جديد" }}
      </h3>
      <button
        (click)="close.emit()"
        class="text-slate-400 hover:text-slate-600 text-2xl leading-none transition-colors"
      >
        ×
      </button>
    </div>

    <!-- النموذج -->
    <div class="p-5 space-y-4">
      <!-- الاسم -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          اسم المنتج
        </label>
        <input
          type="text"
          [(ngModel)]="form.name"
          class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="مثال: قهوة أمريكية"
        />
      </div>

      <!-- الباركود والتصنيف -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            الباركود
          </label>
          <input
            type="text"
            [(ngModel)]="form.barcode"
            class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="100001"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            التصنيف
          </label>
          <select
            [(ngModel)]="form.category"
            class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
          >
            @for (cat of categories(); track cat.id) {
              @if (cat.id !== "all") {
                <option [value]="cat.id">{{ cat.name }}</option>
              }
            }
          </select>
        </div>
      </div>

      <!-- التكلفة والسعر -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            التكلفة
          </label>
          <input
            type="number"
            [(ngModel)]="form.cost"
            min="0"
            class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            سعر البيع
          </label>
          <input
            type="number"
            [(ngModel)]="form.price"
            min="0"
            class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>

      <!-- المخزون والحد الأدنى -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            الكمية
          </label>
          <input
            type="number"
            [(ngModel)]="form.stock"
            min="0"
            class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            حد التنبيه
          </label>
          <input
            type="number"
            [(ngModel)]="form.minStock"
            min="0"
            class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>

      <!-- الحالة -->
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="checkbox"
          [(ngModel)]="form.isActive"
          class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
        />
        <span class="text-sm text-slate-700">منتج مفعّل</span>
      </label>

      <!-- هامش الربح -->
      @if (form.price > 0 && form.cost > 0) {
        <div class="bg-slate-50 rounded-xl p-3 text-sm">
          <span class="text-slate-500">هامش الربح: </span>
          <span
            class="font-bold"
            [class]="
              profitMargin() >= 30
                ? 'text-green-600'
                : profitMargin() >= 15
                  ? 'text-amber-600'
                  : 'text-red-600'
            "
          >
            {{ profitMargin().toFixed(1) }}%
          </span>
        </div>
      }
    </div>

    <!-- الأزرار -->
    <div class="flex gap-2 p-5 border-t">
      <button
        (click)="close.emit()"
        class="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50 transition-colors"
      >
        إلغاء
      </button>
      <button
        (click)="onSave()"
        [disabled]="!isValid()"
        class="flex-1 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-bold hover:bg-blue-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
      >
        {{ editProduct() ? "حفظ التعديلات" : "إضافة المنتج" }}
      </button>
    </div>
  </div>
</div>
