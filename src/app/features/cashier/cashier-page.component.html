<div class="flex h-[calc(100vh-4rem)]">
  <!-- الجزء الأيسر: السلة -->
  <div class="w-96 flex-shrink-0">
    <app-cart-panel (checkout)="onCheckout()" />
  </div>

  <!-- الجزء الأيمن: المنتجات -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- شريط البحث والتصنيفات -->
    <div class="p-4 space-y-3 bg-gray-50 border-b">
      <!-- البحث -->
      <div class="relative">
        <span
          class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"
        >
          🔍
        </span>
        <input
          type="text"
          placeholder="ابحث بالاسم أو الباركود..."
          [value]="searchQuery()"
          (input)="onSearch($event)"
          class="w-full pr-10 pl-4 py-3 rounded-xl border border-slate-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        />
      </div>

      <!-- التصنيفات -->
      <app-category-bar
        [categories]="productService.categories()"
        [activeId]="activeCategory()"
        (selected)="activeCategory.set($event)"
      />
    </div>

    <!-- شبكة المنتجات -->
    <div class="flex-1 overflow-y-auto p-4">
      @if (filterProducts().length === 0) {
        <div class="text-center py-20 text-slate-400">
          <p class="text-5xl mb-4">📭</p>
          <p>لا توجد منتجات مطابقة</p>
        </div>
      } @else {
        <div
          class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3"
        >
          @for (product of filterProducts(); track product.id) {
            <app-product-card
              [products]="product"
              [categoryIcon]="getCategoryIcon(product.category)"
              (addToCart)="onAddToCart($event)"
            />
          }
        </div>
      }
    </div>
    <!-- اقتراحات ذكية -->
    <div class="p-4 pt-0">
      <app-recommendations-bar (addToCart)="onAddToCart($event)" />
    </div>
  </div>
</div>
<!-- المساعد الذكي -->
<app-ai-assistant />
@if (showCheckout()) {
  <app-checkout-dialog (close)="onCloseCheckout()" />
}
