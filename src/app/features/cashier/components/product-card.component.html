<button
  (click)="addToCart.emit(products())"
  [disabled]="products().stock === 0"
  class="w-full bg-white rounded-xl p-4 border text-right transition-all duration-200 group hover:shadow-lg hover:border-blue-300 hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none disabled:hover:translate-y-0"
>
  <!-- الصورة -->
  <div
    class="h-24 bg-slate-100 rounded-lg mb-3 flex items-center justify-center text-4xl group-hover:bg-blue-50 transition-colors"
  >
    {{ categoryIcon() }}
  </div>

  <!-- الاسم -->
  <h3 class="font-bold text-slate-800 text-sm mb-1 truncate">
    {{ products().name }}
  </h3>

  <!-- السعر والمخزون -->
  <div class="flex justify-between items-center mt-2">
    <span class="text-blue-600 font-bold"> {{ products().price }} ر.س </span>
    <span
      class="text-xs px-2 py-0.5 rounded-full"
      [class]="
        products().stock <= products().minStock
          ? 'bg-red-100 text-red-600'
          : 'bg-green-100 text-green-600'
      "
    >
      {{ products().stock }}
    </span>
  </div>
</button>
